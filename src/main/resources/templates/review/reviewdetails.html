<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Cormorant Garamond", "Times New Roman", serif;
        }

        h1,
        h2,
        h3 {
            font-family: "Playfair Display", "Times New Roman", serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2a1a10] via-[#1b120a] to-[#120b07] text-[#f8f2e6] pb-8">
    <div class="mx-6 my-6">
        <div
            class="flex items-center gap-4 rounded-2xl bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#4a3220] p-3 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f1d9b3]/25">
                <svg width="18" height="18" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 21h18M4 21V5a2 2 0 012-2h6v18M14 9h6a1 1 0 011 1v11M8 7h2M8 11h2M8 15h2M16 13h2M16 17h2">
                    </path>
                </svg>
            </div>
            <div class="flex-1"></div>
            <a th:href="@{/reviews(hotelId=${hotelId})}"
                class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/25 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>
        </div>

        <div class="mt-6 flex items-center gap-2 text-sm text-[#f1d9b3]/75">
            <a href="/" class="hover:text-[#f8f2e6]">Home</a>
            <span>/</span>
            <a href="/reviews/list" class="hover:text-[#f8f2e6]">Hotel Reviews</a>
            <span>/</span>
            <a th:href="@{/reviews(hotelId=${hotelId})}" class="hover:text-[#f8f2e6]">Reviews</a>
            <span>/</span>
            <span class="font-semibold text-[#f1d9b3]">Detail</span>
        </div>

        <div class="mt-6 rounded-2xl border border-[#f1d9b3]/20 bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#1a110a] p-6 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15">
            <div class="grid gap-6 lg:grid-cols-[260px_1fr]">
                <div class="h-[200px] rounded-xl bg-cover bg-center shadow-[0_18px_40px_rgba(0,0,0,0.35)]"
                    style="background-image: linear-gradient(180deg, rgba(12,8,4,0.2), rgba(12,8,4,0.6)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=900&auto=format&fit=crop');">
                </div>
                <div>
                    <div class="text-xs font-semibold uppercase tracking-[0.2em] text-[#f1d9b3]/80">Review</div>
                    <h1 class="mt-2 text-3xl font-bold text-[#f8f2e6]" th:text="${review.review_id}">Review #</h1>
                    <p class="mt-2 text-sm text-[#f1d9b3]/85" th:text="${review.comment}">
                        Review comment
                    </p>
                    <div class="mt-4 flex flex-wrap items-center gap-4">
                        <div class="rounded-full bg-[#f1d9b3]/15 px-4 py-2 text-sm font-semibold text-[#f1d9b3]">
                            Rating: <span th:text="${review.rating}">4</span> / 5
                        </div>
                        <div class="text-sm text-[#f1d9b3]/70">
                            Reviewed on <span th:text="${review.review_date}">2026-04-01</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6">
            <h2 class="text-lg font-bold text-[#f8f2e6]">Reservation Details</h2>
            <div class="mt-4 grid gap-4 md:grid-cols-2">
                <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Guest Name</div>
                    <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${review.reservation_GuestName}">
                        —
                    </div>
                </div>
                <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Reservation ID</div>
                    <div class="mt-2 text-base font-semibold text-[#f8f2e6]"
                        th:text="${review.reservation_Reservation_id}">
                        —
                    </div>
                </div>
                <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Check-in Date</div>
                    <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${review.reservation_CheckInDate}">
                        —
                    </div>
                </div>
                <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                    <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Check-out Date</div>
                    <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${review.reservation_CheckOutDate}">
                        —
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
