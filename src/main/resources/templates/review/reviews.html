<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Cormorant Garamond", "Times New Roman", serif;
        }

        h1,
        h2,
        h3 {
            font-family: "Playfair Display", "Times New Roman", serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2a1a10] via-[#1b120a] to-[#120b07] text-[#f8f2e6] pb-8 pt-24">
    <div class="w-full">
        <div class="mx-6 mt-6">
            <div
                class="fixed inset-x-6 top-6 z-50 flex items-center gap-4 rounded-2xl bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#4a3220] p-3 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm">
                <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f1d9b3]/25">
                    <svg width="18" height="18" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 21h18M4 21V5a2 2 0 012-2h6v18M14 9h6a1 1 0 011 1v11M8 7h2M8 11h2M8 15h2M16 13h2M16 17h2">
                        </path>
                    </svg>
                </div>
                <div class="flex-1"></div>
                <a href="/reviews/list"
                    class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/25 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                    <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    Back
                </a>
            </div>

            <div class="mx-0">
                <div class="flex items-center gap-2 text-sm text-[#f1d9b3]/75">
                    <a href="/" class="hover:text-[#f8f2e6]">Home</a>
                    <span>/</span>
                    <a href="/reviews/list" class="hover:text-[#f8f2e6]">Hotel Reviews</a>
                    <span>/</span>
                    <span class="font-semibold text-[#f1d9b3]">Reviews</span>
                </div>

                <div class="mt-2 flex flex-wrap items-center justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-bold text-[#f8f2e6]">Guest Reviews</h1>
                        <p class="text-base text-[#f1d9b3]/85">Read or add reviews for this hotel</p>
                    </div>
                    <button onclick="openInsertModal()"
                        class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/90 px-4 py-2 text-base font-semibold text-[#4a2c12] shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 5v14m7-7H5"></path>
                        </svg>
                        Leave a Review
                    </button>
                </div>

                <div class="mt-4 rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                    <form th:action="@{/reviews}" method="get"
                        class="flex flex-wrap items-center gap-3">
                        <input type="hidden" name="hotelId" th:value="${hotelId}" />
                        <select name="filterBy"
                            class="rounded-full bg-[#3a2618]/60 px-4 py-2 text-sm text-[#f8f2e6] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                            <option value="comment" th:selected="${filterBy == 'comment'}">Comment</option>
                            <option value="rating" th:selected="${filterBy == 'rating'}">Rating</option>
                            <option value="date" th:selected="${filterBy == 'date'}">Date</option>
                        </select>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search reviews..."
                            class="flex-1 min-w-[200px] rounded-full bg-[#3a2618]/60 px-4 py-2 text-sm text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40" />
                        <button type="submit"
                            class="inline-flex items-center gap-2 rounded-full border border-[#f1d9b3]/50 bg-[#f1d9b3]/90 px-4 py-2 text-sm font-semibold text-[#4a2c12]">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                            Search
                        </button>
                    </form>
                </div>

                <div th:if="${message}"
                    class="mt-4 rounded-2xl border border-[#f1d9b3]/30 bg-[#3a2618]/50 px-4 py-3 text-sm text-[#f1d9b3]">
                    <span th:text="${message}">Message</span>
                </div>

                <div class="mt-6 grid gap-4">
                    <div th:each="r : ${reviews}"
                        th:attr="data-id=${r.review_id}, data-hotelid=${hotelId}"
                        onclick="goToDetail(event, this)"
                        class="group cursor-pointer rounded-2xl border border-[#f1d9b3]/20 bg-gradient-to-b from-[#24160d]/95 to-[#1a110a]/95 p-5 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10">
                        <div class="flex flex-wrap items-start justify-between gap-4">
                            <div class="min-w-[220px]">
                                <div class="text-xs uppercase tracking-[0.25em] text-[#f1d9b3]/70">Review</div>
                                <div class="mt-2 text-lg font-semibold text-[#f8f2e6]"
                                    th:text="${r.shortComment}">Great stay...</div>
                                <div class="mt-2 text-xs text-[#f1d9b3]/70" th:text="${r.review_date}">2026-04-01</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="rounded-full bg-[#f1d9b3]/15 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                                    <span th:text="${r.rating}">4</span> / 5
                                </div>
                                <div class="hidden sm:flex items-center gap-1">
                                    <span th:each="i : ${#numbers.sequence(1,5)}"
                                        th:class="${i <= r.rating} ? 'text-[#f1d9b3]' : 'text-[#3a2618]'" class="text-sm">★</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 flex flex-wrap items-center gap-2">
                            <a th:href="@{'/reviews/' + ${r.review_id} + '?hotelId=' + ${hotelId}}"
                                onclick="event.stopPropagation()"
                                class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/90 px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-[#4a2c12]">
                                View Details
                            </a>
                            <button type="button"
                                th:attr="data-id=${r.review_id},data-comment=${r.comment},data-rating=${r.rating},data-date=${r.review_date}"
                                onclick="openUpdateModalFromBtn(this); event.stopPropagation();"
                                class="inline-flex items-center gap-2 rounded-full border border-[#f1d9b3]/40 px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-[#f1d9b3] hover:bg-[#f1d9b3]/10">
                                Edit
                            </button>
                        </div>
                    </div>

                    <div th:if="${reviews == null or #lists.isEmpty(reviews)}"
                        class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-10 text-center text-[#f1d9b3]/70">
                        <div class="text-3xl">✦</div>
                        <p class="mt-2">No reviews have been recorded for this hotel.</p>
                    </div>
                </div>

                <div class="mt-6 flex flex-wrap items-center justify-between gap-4 border-t border-[#f1d9b3]/20 pt-4 text-sm text-[#f1d9b3]/85"
                    th:if="${totalPages > 1}">
                    <div>
                        Page
                        <span th:text="${currentPage + 1}">1</span> of
                        <span th:text="${totalPages}">1</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <a th:if="${currentPage > 0}"
                            th:href="@{/reviews(hotelId=${hotelId}, page=${currentPage - 1}, filterBy=${filterBy}, keyword=${keyword})}"
                            class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-[#f1d9b3]/25 bg-[#1f140b]/60 text-[#f1d9b3] hover:bg-[#f1d9b3]/20">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </a>
                        <span th:if="${currentPage == 0}"
                            class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-[#f1d9b3]/10 bg-[#1f140b]/30 text-[#f1d9b3]/30 cursor-not-allowed">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7"></path>
                            </svg>
                        </span>
                        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:href="@{/reviews(hotelId=${hotelId}, page=${i}, filterBy=${filterBy}, keyword=${keyword})}"
                            th:text="${i + 1}"
                            th:classappend="${i == currentPage} ? 'bg-[#f1d9b3]/90 text-[#4a2c12] font-bold' : 'bg-[#1f140b]/60 text-[#f1d9b3] hover:bg-[#f1d9b3]/20'"
                            class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-[#f1d9b3]/25 text-sm">
                        </a>
                        <a th:if="${currentPage < totalPages - 1}"
                            th:href="@{/reviews(hotelId=${hotelId}, page=${currentPage + 1}, filterBy=${filterBy}, keyword=${keyword})}"
                            class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-[#f1d9b3]/25 bg-[#1f140b]/60 text-[#f1d9b3] hover:bg-[#f1d9b3]/20">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7"></path>
                            </svg>
                        </a>
                        <span th:if="${currentPage >= totalPages - 1}"
                            class="inline-flex h-8 w-8 items-center justify-center rounded-lg border border-[#f1d9b3]/10 bg-[#1f140b]/30 text-[#f1d9b3]/30 cursor-not-allowed">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                                </path>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="insertModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/45 backdrop-blur-sm px-4">
        <div
            class="w-full max-w-xl rounded-2xl border border-[#f1d9b3]/20 bg-gradient-to-b from-[#24160d] to-[#1a110a] p-6 shadow-[0_24px_60px_rgba(0,0,0,0.45)]">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-[#f8f2e6]">Leave a Review</h2>
                <button class="inline-flex h-8 w-8 items-center justify-center rounded-full border border-[#f1d9b3]/30 text-[#f1d9b3] hover:bg-[#f1d9b3]/15"
                    onclick="closeModal('insertModal')">✕</button>
            </div>
            <form th:action="@{/reviews/create}" method="post" class="mt-5 space-y-4">
                <input type="hidden" name="hotelId" th:value="${hotelId}" />
                <div>
                    <label class="text-sm text-[#f1d9b3]/75">Reservation ID</label>
                    <input type="number" name="reservationId" required
                        class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                </div>
                <div>
                    <label class="text-sm text-[#f1d9b3]/75">Comment</label>
                    <textarea name="comment" rows="3" required
                        class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40"></textarea>
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <div>
                        <label class="text-sm text-[#f1d9b3]/75">Rating (0–5)</label>
                        <input type="number" name="rating" min="0" max="5" required
                            class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                    </div>
                    <div>
                        <label class="text-sm text-[#f1d9b3]/75">Review Date</label>
                        <input type="date" name="review_date" required
                            class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                    </div>
                </div>
                <div class="flex items-center justify-end gap-3 pt-2">
                    <button type="button"
                        class="rounded-full border border-[#f1d9b3]/30 px-4 py-2 text-sm font-semibold text-[#f1d9b3] hover:bg-[#f1d9b3]/10"
                        onclick="closeModal('insertModal')">Cancel</button>
                    <button type="submit"
                        class="rounded-full bg-[#f1d9b3]/90 px-4 py-2 text-sm font-semibold text-[#4a2c12] shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
                        Submit Review
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="updateModal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/45 backdrop-blur-sm px-4">
        <div
            class="w-full max-w-xl rounded-2xl border border-[#f1d9b3]/20 bg-gradient-to-b from-[#24160d] to-[#1a110a] p-6 shadow-[0_24px_60px_rgba(0,0,0,0.45)]">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-[#f8f2e6]">Edit Review</h2>
                <button class="inline-flex h-8 w-8 items-center justify-center rounded-full border border-[#f1d9b3]/30 text-[#f1d9b3] hover:bg-[#f1d9b3]/15"
                    onclick="closeModal('updateModal')">✕</button>
            </div>
            <form id="updateForm" method="post" class="mt-5 space-y-4">
                <input type="hidden" name="hotelId" th:value="${hotelId}" />
                <input type="hidden" name="reviewId" id="updateReviewId" />
                <div>
                    <label class="text-sm text-[#f1d9b3]/75">Comment</label>
                    <textarea name="comment" id="updateComment" rows="3" required
                        class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40"></textarea>
                </div>
                <div class="grid gap-4 md:grid-cols-2">
                    <div>
                        <label class="text-sm text-[#f1d9b3]/75">Rating (0–5)</label>
                        <input type="number" name="rating" id="updateRating" min="0" max="5" required
                            class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                    </div>
                    <div>
                        <label class="text-sm text-[#f1d9b3]/75">Review Date</label>
                        <input type="date" name="review_date" id="updateDate" required
                            class="mt-2 w-full rounded-xl bg-[#3a2618]/60 px-4 py-2 text-[#f8f2e6] focus:outline-none focus:ring-2 focus:ring-[#f1d9b3]/40">
                    </div>
                </div>
                <div class="flex items-center justify-end gap-3 pt-2">
                    <button type="button"
                        class="rounded-full border border-[#f1d9b3]/30 px-4 py-2 text-sm font-semibold text-[#f1d9b3] hover:bg-[#f1d9b3]/10"
                        onclick="closeModal('updateModal')">Cancel</button>
                    <button type="submit"
                        class="rounded-full bg-[#f1d9b3]/90 px-4 py-2 text-sm font-semibold text-[#4a2c12] shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
                        Update Review
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        function openInsertModal() {
            document.getElementById('insertModal').classList.remove('hidden');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
        function openUpdateModalFromBtn(btn) {
            const id = btn.getAttribute("data-id");
            const comment = btn.getAttribute("data-comment");
            const rating = btn.getAttribute("data-rating");
            const date = btn.getAttribute("data-date");

            document.getElementById('updateReviewId').value = id;
            document.getElementById('updateComment').value = comment;
            document.getElementById('updateRating').value = rating;
            document.getElementById('updateDate').value = date;

            document.getElementById('updateForm').action = '/reviews/' + id + '/update';
            document.getElementById('updateModal').classList.remove('hidden');
        }
        document.querySelectorAll('#insertModal, #updateModal').forEach(bd =>
            bd.addEventListener('click', e => {
                if (e.target === bd) bd.classList.add('hidden');
            })
        );
        function goToDetail(e, card) {
            if (e.target.closest('a, button')) return;
            const id = card.getAttribute("data-id");
            const hotelId = card.getAttribute("data-hotelid");
            window.location.href = '/reviews/' + id + '?hotelId=' + hotelId;
        }
    </script>
</body>

</html>
