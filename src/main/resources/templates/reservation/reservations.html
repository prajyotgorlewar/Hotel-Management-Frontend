<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reservations</title>
</head>

<body style="font-family: Arial; margin:20px;">

    <h2>Reservations</h2>

    <!-- 🔥 SEARCH FORM -->
    <form method="get" action="/reservations" onsubmit="return validateSearch()"
        style="margin-bottom:20px; display:flex; flex-wrap:wrap; gap:10px;">

        <input type="text" id="guestName" name="guestName" placeholder="Guest Name" th:value="${guestName}"
            style="padding:8px; border:1px solid #ccc; border-radius:5px;">

        <input type="text" id="email" name="email" placeholder="Email" th:value="${email}"
            style="padding:8px; border:1px solid #ccc; border-radius:5px;">

        <input type="date" id="checkIn" name="checkIn" th:value="${checkIn}"
            style="padding:8px; border:1px solid #ccc; border-radius:5px;">

        <input type="date" id="checkOut" name="checkOut" th:value="${checkOut}"
            style="padding:8px; border:1px solid #ccc; border-radius:5px;">

        <button type="submit"
            style="padding:8px 15px; background:#007bff; color:white; border:none; border-radius:5px;">
            Search
        </button>

        <a href="/reservations"
            style="padding:8px 15px; background:gray; color:white; text-decoration:none; border-radius:5px;">
            Clear
        </a>

    </form>

    <p style="color:gray; font-size:12px;">
        * Only one field allowed OR check-in + check-out together
    </p>

    <!-- 🔥 TABLE -->
    <table border="1" width="100%" cellpadding="10" cellspacing="0">

        <thead style="background:#f2f2f2;">
            <tr>
                <th>ID</th>
                <th>Guest Name</th>
                <th>Email</th>
                <th>Check-In</th>
                <th>Check-Out</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="res : ${reservations}" th:onclick="'location.href=\'/reservations/' + ${res.id} + '/details\''"
                style="cursor:pointer;">

                <td th:text="${res.id}"></td>
                <td th:text="${res.guestName}"></td>
                <td th:text="${res.guestEmail}"></td>
                <td th:text="${res.checkInDate}"></td>
                <td th:text="${res.checkOutDate}"></td>

            </tr>
        </tbody>

    </table>

    <!-- 🔥 PAGINATION -->
    <div style="margin-top:20px; text-align:center;">

        <!-- Previous -->
        <a th:if="${currentPage > 0}" th:href="@{/reservations(
            page=${currentPage - 1},
            guestName=${guestName},
            email=${email},
            checkIn=${checkIn},
            checkOut=${checkOut}
       )}" style="margin-right:10px;">
            ⬅ Previous
        </a>

        <span>
            Page <span th:text="${currentPage + 1}"></span>
        </span>

        <!-- Next -->
        <a th:href="@{/reservations(
            page=${currentPage + 1},
            guestName=${guestName},
            email=${email},
            checkIn=${checkIn},
            checkOut=${checkOut}
       )}" style="margin-left:10px;">
            Next ➡
        </a>

    </div>

    <!-- 🔥 VALIDATION SCRIPT -->
    <script>
        function validateSearch() {
            const name = document.getElementById("guestName").value.trim();
            const email = document.getElementById("email").value.trim();
            const checkIn = document.getElementById("checkIn").value;
            const checkOut = document.getElementById("checkOut").value;

            let count = 0;

            if (name) count++;
            if (email) count++;
            if (checkIn) count++;
            if (checkOut) count++;

            // ❌ More than 1 field but not valid combo
            if (count > 1) {
                if (!(checkIn && checkOut && count === 2)) {
                    alert("Use only ONE field OR check-in + check-out together");
                    return false;
                }
            }

            return true;
        }
    </script>

</body>

</html>
