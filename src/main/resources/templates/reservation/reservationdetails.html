<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Details - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="reservations.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Reservations
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="detail-container fade-in" id="reservationDetail">
        </div>
    </main>

    <script>
        const reservations = [
            { id: "RES001", guest: "Michael Anderson", email: "michael@email.com", phone: "+1 (555) 123-4567", hotel: "Grand Plaza Hotel", hotelId: 1, room: "Deluxe Suite", roomNumber: "501", checkIn: "2024-03-15", checkOut: "2024-03-20", status: "Confirmed", amount: 1250, guests: 2, specialRequests: "Late check-in requested, non-smoking room preferred" },
            { id: "RES002", guest: "Sarah Johnson", email: "sarah.j@email.com", phone: "+1 (555) 234-5678", hotel: "Seaside Resort", hotelId: 2, room: "Ocean View Room", roomNumber: "302", checkIn: "2024-03-18", checkOut: "2024-03-22", status: "Pending", amount: 890, guests: 2, specialRequests: "Honeymoon package, champagne on arrival" },
            { id: "RES003", guest: "David Wilson", email: "dwilson@email.com", phone: "+1 (555) 345-6789", hotel: "Mountain Lodge", hotelId: 3, room: "Mountain Suite", roomNumber: "205", checkIn: "2024-03-20", checkOut: "2024-03-25", status: "Confirmed", amount: 1100, guests: 4, specialRequests: "Extra beds for children, high floor if possible" },
            { id: "RES004", guest: "Emily Brown", email: "emily.b@email.com", phone: "+1 (555) 456-7890", hotel: "City Center Inn", hotelId: 4, room: "Standard Room", roomNumber: "108", checkIn: "2024-03-22", checkOut: "2024-03-24", status: "Cancelled", amount: 320, guests: 1, specialRequests: "Early check-in if available" },
            { id: "RES005", guest: "James Taylor", email: "jtaylor@email.com", phone: "+1 (555) 567-8901", hotel: "Lakefront Hotel", hotelId: 5, room: "Lake View Suite", roomNumber: "701", checkIn: "2024-03-25", checkOut: "2024-03-30", status: "Confirmed", amount: 1575, guests: 2, specialRequests: "Anniversary celebration, lakeside dining reservation" },
            { id: "RES006", guest: "Lisa Martinez", email: "lisa.m@email.com", phone: "+1 (555) 678-9012", hotel: "Desert Oasis Resort", hotelId: 6, room: "Golf Villa", roomNumber: "Villa 12", checkIn: "2024-03-28", checkOut: "2024-04-02", status: "Pending", amount: 2100, guests: 3, specialRequests: "Golf tee times for 3 guests, spa appointments" },
            { id: "RES007", guest: "Robert Garcia", email: "rgarcia@email.com", phone: "+1 (555) 789-0123", hotel: "Grand Plaza Hotel", hotelId: 1, room: "Executive Suite", roomNumber: "1201", checkIn: "2024-04-01", checkOut: "2024-04-05", status: "Confirmed", amount: 1800, guests: 2, specialRequests: "Business center access, meeting room booking" },
            { id: "RES008", guest: "Jennifer Lee", email: "jlee@email.com", phone: "+1 (555) 890-1234", hotel: "Seaside Resort", hotelId: 2, room: "Beachfront Bungalow", roomNumber: "Bungalow 5", checkIn: "2024-04-05", checkOut: "2024-04-10", status: "Confirmed", amount: 1650, guests: 4, specialRequests: "Family package, kids activities" }
        ];

        function getStatusClass(status) {
            switch (status.toLowerCase()) {
                case 'confirmed': return 'status-confirmed';
                case 'pending': return 'status-pending';
                case 'cancelled': return 'status-cancelled';
                default: return 'status-pending';
            }
        }

        function getReservationId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || 'RES001';
        }

        function calculateNights(checkIn, checkOut) {
            const start = new Date(checkIn);
            const end = new Date(checkOut);
            return Math.ceil((end - start) / (1000 * 60 * 60 * 24));
        }

        function renderReservationDetail() {
            const id = getReservationId();
            const reservation = reservations.find(r => r.id === id) || reservations[0];
            const nights = calculateNights(reservation.checkIn, reservation.checkOut);

            document.getElementById('reservationDetail').innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
                    <div>
                        <h1 class="detail-title">Reservation ${reservation.id}</h1>
                        <p class="detail-subtitle">${reservation.hotel}</p>
                    </div>
                    <span class="status-badge ${getStatusClass(reservation.status)}" style="font-size: 0.875rem; padding: 0.5rem 1rem;">${reservation.status}</span>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Guest Information</h3>
                    <div class="detail-row">
                        <span class="detail-label">Guest Name</span>
                        <span class="detail-value">${reservation.guest}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${reservation.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${reservation.phone}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Number of Guests</span>
                        <span class="detail-value">${reservation.guests}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Booking Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Hotel</span>
                        <span class="detail-value">${reservation.hotel}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Room Type</span>
                        <span class="detail-value">${reservation.room}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Room Number</span>
                        <span class="detail-value">${reservation.roomNumber}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Check-in Date</span>
                        <span class="detail-value">${reservation.checkIn}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Check-out Date</span>
                        <span class="detail-value">${reservation.checkOut}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duration</span>
                        <span class="detail-value">${nights} nights</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Payment Summary</h3>
                    <div class="detail-row">
                        <span class="detail-label">Room Rate (per night)</span>
                        <span class="detail-value">$${Math.round(reservation.amount / nights).toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Number of Nights</span>
                        <span class="detail-value">${nights}</span>
                    </div>
                    <div class="detail-row" style="border-top: 2px solid #e5e7eb; padding-top: 1rem; margin-top: 0.5rem;">
                        <span class="detail-label" style="font-weight: 600; color: #111827;">Total Amount</span>
                        <span class="detail-value" style="font-size: 1.25rem; color: #3b82f6;">$${reservation.amount.toLocaleString()}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Special Requests</h3>
                    <p style="color: #4b5563; line-height: 1.7;">${reservation.specialRequests}</p>
                </div>
            `;
        }

        renderReservationDetail();
    </script>
</body>

</html>
