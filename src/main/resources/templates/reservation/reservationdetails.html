<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reservation Details | LuxStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        body { margin: 0; min-height: 100vh; background: linear-gradient(180deg, #2a1a10, #1b120a, #120b07); color: #f8f2e6; font-family: "DM Sans", Arial, sans-serif; }
        h1, h2, h3, .serif { font-family: "Playfair Display", "Times New Roman", serif; }
        .shell { padding: 1.5rem; }
        .nav { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 1.25rem; background: linear-gradient(90deg, #4a3220, rgba(58, 38, 24, 0.92), #4a3220); border: 1px solid rgba(241, 217, 179, 0.1); box-shadow: 0 24px 60px rgba(0,0,0,0.35); }
        .brand { text-decoration: none; color: #f8f2e6; font-size: 1.9rem; line-height: 1; }
        .brand span { color: #f1d9b3; }
        .page { max-width: 980px; margin: 1.5rem auto 0; }
        .panel { border-radius: 1.5rem; border: 1px solid rgba(241, 217, 179, 0.18); background: linear-gradient(180deg, rgba(36,22,13,0.96), rgba(26,17,10,0.98)); box-shadow: 0 24px 60px rgba(0,0,0,0.35); overflow: hidden; }
        .hero { padding: 1.6rem; border-bottom: 1px solid rgba(241, 217, 179, 0.12); }
        .hero .eyebrow { text-transform: uppercase; letter-spacing: 0.2em; color: rgba(241, 217, 179, 0.75); font-size: 0.72rem; }
        .hero h1 { margin: 0.45rem 0 0; font-size: clamp(2rem, 5vw, 2.8rem); }
        .hero p { margin: 0.45rem 0 0; color: rgba(241, 217, 179, 0.8); }
        .grid { display: grid; gap: 1rem; grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 1.4rem; }
        .card { border: 1px solid rgba(241, 217, 179, 0.12); border-radius: 1.15rem; background: rgba(255,255,255,0.02); padding: 1.15rem; }
        .card h2 { margin: 0 0 1rem; font-size: 1.25rem; }
        .row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.55rem 0; border-top: 1px solid rgba(241, 217, 179, 0.08); }
        .row:first-of-type { border-top: 0; padding-top: 0; }
        .label { color: rgba(241, 217, 179, 0.7); }
        .value { text-align: right; font-weight: 600; }
        .total { color: #f1d9b3; font-size: 1.1rem; }
        .actions { padding: 0 1.4rem 1.4rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.8rem 1.15rem; border-radius: 999px; background: rgba(241, 217, 179, 0.92); color: #4a2c12; text-decoration: none; font-weight: 700; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .shell { padding: 1rem; } }
    </style>
</head>
<body>
<div class="shell">
    <div class="nav">
        <a class="brand serif" href="/reservations">Lux<span>Stay</span></a>
    </div>

    <main class="page">
        <section class="panel">
            <div class="hero">
                <div class="eyebrow">Reservation</div>
                <h1 th:text="${'Reservation #' + res.reservationId}">Reservation #1</h1>
                <p th:text="${res.hotelName + ' | Room ' + res.roomNumber}">Hotel | Room</p>
            </div>

            <div class="grid">
                <article class="card">
                    <h2>Guest Information</h2>
                    <div class="row"><span class="label">Name</span><span class="value" th:text="${res.guestName}">Guest</span></div>
                    <div class="row"><span class="label">Email</span><span class="value" th:text="${res.guestEmail}">guest@example.com</span></div>
                    <div class="row"><span class="label">Check-In</span><span class="value" th:text="${res.checkInDate}">2026-04-02</span></div>
                    <div class="row"><span class="label">Check-Out</span><span class="value" th:text="${res.checkOutDate}">2026-04-04</span></div>
                </article>

                <article class="card">
                    <h2>Stay Details</h2>
                    <div class="row"><span class="label">Hotel</span><span class="value" th:text="${res.hotelName}">LuxStay</span></div>
                    <div class="row"><span class="label">Location</span><span class="value" th:text="${res.hotelLocation}">City</span></div>
                    <div class="row"><span class="label">Room</span><span class="value" th:text="${res.roomNumber}">101</span></div>
                    <div class="row"><span class="label">Payment Status</span><span class="value" th:text="${res.paymentStatus}">Paid</span></div>
                </article>

                <article class="card" style="grid-column: 1 / -1;">
                    <h2>Payment Summary</h2>
                    <div class="row"><span class="label">Amount</span><span class="value total" th:text="${'$' + #numbers.formatDecimal(res.paymentAmount,1,2)}">$200.00</span></div>
                </article>
            </div>

            <div class="actions">
                <a href="/reservations" class="btn">Back to Reservations</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
