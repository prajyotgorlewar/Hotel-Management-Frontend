<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Cormorant Garamond", "Times New Roman", serif;
        }

        h1,
        h2,
        h3 {
            font-family: "Playfair Display", "Times New Roman", serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2a1a10] via-[#1b120a] to-[#120b07] text-[#f8f2e6] pb-8">
    <div class="mx-6 my-6">
        <div
            class="flex items-center gap-4 rounded-2xl bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#4a3220] p-3 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f1d9b3]/25">
                <svg width="18" height="18" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 21h18M4 21V5a2 2 0 012-2h6v18M14 9h6a1 1 0 011 1v11M8 7h2M8 11h2M8 15h2M16 13h2M16 17h2">
                    </path>
                </svg>
            </div>
            <div class="flex-1"></div>
            <a href="/reservations"
                class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/25 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>
        </div>

        <div class="mt-6 flex items-center gap-2 text-sm text-[#f1d9b3]/75">
            <a href="/" class="hover:text-[#f8f2e6]">Home</a>
            <span>/</span>
            <a href="/reservations" class="hover:text-[#f8f2e6]">Reservations</a>
            <span>/</span>
            <span class="font-semibold text-[#f1d9b3]">Details</span>
        </div>

        <div class="mt-6 rounded-2xl bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#1a110a] p-6 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15">
            <div class="grid gap-6 lg:grid-cols-[260px_1fr]">
                <div class="h-[200px] rounded-xl bg-cover bg-center shadow-[0_18px_40px_rgba(0,0,0,0.35)]"
                    style="background-image: linear-gradient(180deg, rgba(12,8,4,0.2), rgba(12,8,4,0.6)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=900&auto=format&fit=crop');">
                </div>
                <div>
                    <div class="text-xs font-semibold uppercase tracking-[0.2em] text-[#f1d9b3]/80">Reservation</div>
                    <h1 class="mt-2 text-3xl font-bold text-[#f8f2e6]" th:text="${'Reservation #' + res.reservationId}">
                        Reservation #1
                    </h1>
                    <p class="mt-2 text-sm text-[#f1d9b3]/85" th:text="${res.hotelName + ' | Room ' + res.roomNumber}">
                        Hotel | Room
                    </p>
                    <div class="mt-4 flex flex-wrap items-center gap-4">
                        <div class="rounded-full bg-[#f1d9b3]/15 px-4 py-2 text-sm font-semibold text-[#f1d9b3]">
                            <span th:text="${res.paymentStatus}">Paid</span>
                        </div>
                        <div class="text-sm text-[#f1d9b3]/70">
                            Amount:
                            <span th:text="${'$' + #numbers.formatDecimal(res.paymentAmount,1,2)}">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 grid gap-4 md:grid-cols-2">
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Guest Name</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.guestName}">Guest</div>
            </div>
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Guest Email</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.guestEmail}">Email</div>
            </div>
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Check-In Date</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.checkInDate}">Date</div>
            </div>
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Check-Out Date</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.checkOutDate}">Date</div>
            </div>
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Hotel</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.hotelName}">Hotel</div>
            </div>
            <div class="rounded-2xl border border-[#f1d9b3]/20 bg-[#1a110a]/70 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-[#f1d9b3]/70">Location</div>
                <div class="mt-2 text-base font-semibold text-[#f8f2e6]" th:text="${res.hotelLocation}">Location</div>
            </div>
        </div>
    </div>
</body>

</html>
