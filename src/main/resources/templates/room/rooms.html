<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title">Rooms</h1>
        <p class="page-subtitle">Manage room inventory and availability</p>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search rooms..."
                onkeyup="filterRooms()">
        </div>

        <div class="card-grid fade-in" id="roomsGrid">
        </div>
    </main>

    <script>
        const rooms = [
            { id: 1, type: "Deluxe Suite", hotel: "Grand Plaza Hotel", hotelId: 1, roomNumber: "501", floor: 5, price: 450, capacity: 2, beds: "1 King", status: "Available", image: "https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400&h=300&fit=crop", amenities: ["WiFi", "Mini Bar", "Room Service", "City View"] },
            { id: 2, type: "Ocean View Room", hotel: "Seaside Resort", hotelId: 2, roomNumber: "302", floor: 3, price: 320, capacity: 2, beds: "1 Queen", status: "Occupied", image: "https://images.unsplash.com/photo-1590490360182-c33d57733427?w=400&h=300&fit=crop", amenities: ["WiFi", "Ocean View", "Balcony", "Mini Bar"] },
            { id: 3, type: "Mountain Suite", hotel: "Mountain Lodge", hotelId: 3, roomNumber: "205", floor: 2, price: 380, capacity: 4, beds: "2 Queens", status: "Available", image: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=400&h=300&fit=crop", amenities: ["WiFi", "Fireplace", "Mountain View", "Kitchenette"] },
            { id: 4, type: "Standard Room", hotel: "City Center Inn", hotelId: 4, roomNumber: "108", floor: 1, price: 150, capacity: 2, beds: "1 Queen", status: "Maintenance", image: "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=400&h=300&fit=crop", amenities: ["WiFi", "TV", "Coffee Maker"] },
            { id: 5, type: "Lake View Suite", hotel: "Lakefront Hotel", hotelId: 5, roomNumber: "701", floor: 7, price: 520, capacity: 2, beds: "1 King", status: "Available", image: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&h=300&fit=crop", amenities: ["WiFi", "Lake View", "Balcony", "Jacuzzi", "Mini Bar"] },
            { id: 6, type: "Golf Villa", hotel: "Desert Oasis Resort", hotelId: 6, roomNumber: "Villa 12", floor: 1, price: 680, capacity: 4, beds: "2 Kings", status: "Occupied", image: "https://images.unsplash.com/photo-1602002418082-a4443e081dd1?w=400&h=300&fit=crop", amenities: ["WiFi", "Private Pool", "Golf Cart", "Kitchen", "Patio"] },
            { id: 7, type: "Executive Suite", hotel: "Grand Plaza Hotel", hotelId: 1, roomNumber: "1201", floor: 12, price: 550, capacity: 2, beds: "1 King", status: "Available", image: "https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=400&h=300&fit=crop", amenities: ["WiFi", "Office Space", "Lounge Access", "City View", "Mini Bar"] },
            { id: 8, type: "Beachfront Bungalow", hotel: "Seaside Resort", hotelId: 2, roomNumber: "Bungalow 5", floor: 1, price: 480, capacity: 4, beds: "1 King + 2 Twins", status: "Available", image: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400&h=300&fit=crop", amenities: ["WiFi", "Beach Access", "Private Deck", "Outdoor Shower", "Mini Bar"] }
        ];

        function getStatusClass(status) {
            switch (status.toLowerCase()) {
                case 'available': return 'badge-green';
                case 'occupied': return 'badge-blue';
                case 'maintenance': return 'badge-yellow';
                default: return 'badge-blue';
            }
        }

        function renderRooms(data) {
            const grid = document.getElementById('roomsGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No rooms found</h3><p>Try adjusting your search</p></div>';
                return;
            }
            grid.innerHTML = data.map(room => `
                <div class="room-card" onclick="location.href='roomdetails.html?id=${room.id}'">
                    <img src="${room.image}" alt="${room.type}" class="card-image">
                    <div class="room-card-body">
                        <h3 class="room-type">${room.type}</h3>
                        <p class="room-hotel">${room.hotel} - Room ${room.roomNumber}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem;">
                            <span class="room-price">$${room.price} <span>/night</span></span>
                            <span class="card-badge ${getStatusClass(room.status)}">${room.status}</span>
                        </div>
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem;">
                            <span style="font-size: 0.75rem; color: #6b7280;">
                                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: inline; vertical-align: middle;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                ${room.capacity} guests
                            </span>
                            <span style="font-size: 0.75rem; color: #6b7280;">
                                ${room.beds}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterRooms() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rooms.filter(r =>
                r.type.toLowerCase().includes(search) ||
                r.hotel.toLowerCase().includes(search) ||
                r.roomNumber.toLowerCase().includes(search)
            );
            renderRooms(filtered);
        }

        renderRooms(rooms);
    </script>
</body>

</html>
