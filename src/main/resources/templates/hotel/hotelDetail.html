<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Cormorant Garamond", "Times New Roman", serif;
        }

        h1,
        h2,
        h3 {
            font-family: "Playfair Display", "Times New Roman", serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2a1a10] via-[#1b120a] to-[#120b07] text-[#f8f2e6] pb-8">
    <div class="mx-6 my-6">
        <div
            class="flex items-center gap-4 rounded-2xl bg-gradient-to-r from-[#4a3220] via-[#3a2618]/90 to-[#4a3220] p-3 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f1d9b3]/25">
                <svg width="18" height="18" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 21h18M4 21V5a2 2 0 012-2h6v18M14 9h6a1 1 0 011 1v11M8 7h2M8 11h2M8 15h2M16 13h2M16 17h2">
                    </path>
                </svg>
            </div>
            <div class="flex-1"></div>
            <a href="/hotels"
                class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/25 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>
        </div>

        <div class="mt-6 flex items-center gap-2 text-sm text-[#f1d9b3]/75">
            <a href="/" class="hover:text-[#f8f2e6]">Home</a>
            <span>/</span>
            <a href="/hotels" class="hover:text-[#f8f2e6]">Hotels</a>
            <span>/</span>
            <span class="font-semibold text-[#f1d9b3]" th:text="${hotel.name}">Hotel Name</span>
        </div>

        <div class="mt-6">
            <h1 class="text-3xl font-bold text-[#f8f2e6]" th:text="${hotel.name}">
                The Grand Plaza Resort &amp; Spa
            </h1>
            <div class="mt-3 flex items-center gap-2 text-sm text-[#f1d9b3]/85">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span th:text="${hotel.location}">452 Riviera Boulevard, Monaco</span>
            </div>
            <p class="mt-3 max-w-2xl text-base text-[#f1d9b3]/85" th:text="${hotel.description}">
                Luxury hotel with stunning views of the city.
            </p>
        </div>

        <div class="mt-6 grid gap-4 md:grid-cols-3">
            <div class="h-56 rounded-2xl bg-cover bg-center shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15"
                th:style="|background-image: linear-gradient(180deg, rgba(12,8,4,0.25), rgba(12,8,4,0.6)), url(${hotel.image != null ? hotel.image : 'https://images.unsplash.com/photo-1566073771259-6a8506099945'})|">
            </div>
            <div class="h-56 rounded-2xl bg-cover bg-center shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15"
                style="background-image: linear-gradient(180deg, rgba(12,8,4,0.25), rgba(12,8,4,0.6)), url(\"https://images.unsplash.com/photo-1501117716987-c8e1ecb210d1?auto=format&fit=crop&w=1200&q=80\");">
            </div>
            <div class="h-56 rounded-2xl bg-cover bg-center shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15"
                style="background-image: linear-gradient(180deg, rgba(12,8,4,0.25), rgba(12,8,4,0.6)), url(\"https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1200&q=80\");">
            </div>
        </div>

            <div class="mt-6">
                <h2 class="text-lg font-bold text-[#f8f2e6]">Amenities</h2>
                <div class="mt-3 flex flex-wrap gap-2">
                    <span th:if="${amenities == null or #lists.isEmpty(amenities)}"
                        class="rounded-full bg-[#1f140b]/60 px-3 py-1 text-sm text-[#f1d9b3]/60 border border-[#f1d9b3]/15">
                    No amenities listed
                    </span>
                    <span th:each="a : ${amenities}" th:text="${a.name}"
                        class="rounded-full bg-[#f1d9b3]/90 px-3 py-1 text-sm font-semibold text-[#4a2c12]">
                        Amenity
                    </span>
                </div>
            </div>
    </div>
</body>

</html>
