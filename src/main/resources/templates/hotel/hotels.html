<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title">Hotels</h1>
        <p class="page-subtitle">Manage all hotel properties</p>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search hotels..."
                onkeyup="filterHotels()">
        </div>

        <div class="card-grid fade-in" id="hotelsGrid">
        </div>
    </main>

    <script>
        const hotels = [
            { id: 1, name: "Grand Plaza Hotel", location: "New York, USA", rating: 5, rooms: 250, image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=300&fit=crop", status: "Active" },
            { id: 2, name: "Seaside Resort", location: "Miami, USA", rating: 4, rooms: 180, image: "https://images.unsplash.com/photo-1582719508461-905c673771fd?w=400&h=300&fit=crop", status: "Active" },
            { id: 3, name: "Mountain Lodge", location: "Denver, USA", rating: 4, rooms: 75, image: "https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=400&h=300&fit=crop", status: "Active" },
            { id: 4, name: "City Center Inn", location: "Chicago, USA", rating: 3, rooms: 120, image: "https://images.unsplash.com/photo-1564501049412-61c2a3083791?w=400&h=300&fit=crop", status: "Maintenance" },
            { id: 5, name: "Lakefront Hotel", location: "Seattle, USA", rating: 5, rooms: 200, image: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=400&h=300&fit=crop", status: "Active" },
            { id: 6, name: "Desert Oasis Resort", location: "Phoenix, USA", rating: 4, rooms: 150, image: "https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=400&h=300&fit=crop", status: "Active" }
        ];

        function renderStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < rating) {
                    stars += '<svg class="star star-filled" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
                } else {
                    stars += '<svg class="star star-empty" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
                }
            }
            return stars;
        }

        function renderHotels(data) {
            const grid = document.getElementById('hotelsGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h3>No hotels found</h3><p>Try adjusting your search</p></div>';
                return;
            }
            grid.innerHTML = data.map(hotel => `
                <div class="card" onclick="location.href='hoteldetails.html?id=${hotel.id}'">
                    <img src="${hotel.image}" alt="${hotel.name}" class="card-image">
                    <div class="card-body">
                        <h3 class="card-title">${hotel.name}</h3>
                        <p class="card-text">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            ${hotel.location}
                        </p>
                        <div class="rating" style="margin: 0.5rem 0;">
                            ${renderStars(hotel.rating)}
                        </div>
                        <p class="card-text">${hotel.rooms} Rooms</p>
                        <span class="card-badge ${hotel.status === 'Active' ? 'badge-green' : 'badge-yellow'}">${hotel.status}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterHotels() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = hotels.filter(h =>
                h.name.toLowerCase().includes(search) ||
                h.location.toLowerCase().includes(search)
            );
            renderHotels(filtered);
        }

        renderHotels(hotels);
    </script>
</body>

</html>
