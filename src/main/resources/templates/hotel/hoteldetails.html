<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Details - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="hotels.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Hotels
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="detail-container fade-in" id="hotelDetail">
        </div>
    </main>

    <script>
        const hotels = [
            { id: 1, name: "Grand Plaza Hotel", location: "New York, USA", address: "123 Fifth Avenue, New York, NY 10001", rating: 5, rooms: 250, image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=600&h=400&fit=crop", status: "Active", phone: "+1 (212) 555-0123", email: "info@grandplaza.com", amenities: ["Pool", "Spa", "Gym", "Restaurant", "Bar", "WiFi", "Parking", "Room Service"], description: "Experience luxury at its finest in the heart of Manhattan. Our 5-star hotel offers world-class amenities and unparalleled service." },
            { id: 2, name: "Seaside Resort", location: "Miami, USA", address: "456 Ocean Drive, Miami Beach, FL 33139", rating: 4, rooms: 180, image: "https://images.unsplash.com/photo-1582719508461-905c673771fd?w=600&h=400&fit=crop", status: "Active", phone: "+1 (305) 555-0456", email: "reservations@seasideresort.com", amenities: ["Beach Access", "Pool", "Spa", "Restaurant", "Bar", "WiFi"], description: "A beachfront paradise with stunning ocean views and direct beach access. Perfect for a relaxing getaway." },
            { id: 3, name: "Mountain Lodge", location: "Denver, USA", address: "789 Alpine Road, Denver, CO 80202", rating: 4, rooms: 75, image: "https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=600&h=400&fit=crop", status: "Active", phone: "+1 (303) 555-0789", email: "stay@mountainlodge.com", amenities: ["Ski Access", "Fireplace", "Restaurant", "Spa", "WiFi", "Parking"], description: "Nestled in the Rocky Mountains, our cozy lodge offers the perfect escape for nature lovers and adventure seekers." },
            { id: 4, name: "City Center Inn", location: "Chicago, USA", address: "321 Michigan Avenue, Chicago, IL 60601", rating: 3, rooms: 120, image: "https://images.unsplash.com/photo-1564501049412-61c2a3083791?w=600&h=400&fit=crop", status: "Maintenance", phone: "+1 (312) 555-0321", email: "info@citycenterinn.com", amenities: ["Restaurant", "Bar", "WiFi", "Business Center", "Parking"], description: "Conveniently located in downtown Chicago, perfect for business travelers and city explorers." },
            { id: 5, name: "Lakefront Hotel", location: "Seattle, USA", address: "555 Waterfront Way, Seattle, WA 98101", rating: 5, rooms: 200, image: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600&h=400&fit=crop", status: "Active", phone: "+1 (206) 555-0555", email: "reservations@lakefronthotel.com", amenities: ["Lake View", "Pool", "Spa", "Restaurant", "Bar", "WiFi", "Gym", "Concierge"], description: "Overlooking the beautiful Puget Sound, our hotel combines Pacific Northwest charm with modern luxury." },
            { id: 6, name: "Desert Oasis Resort", location: "Phoenix, USA", address: "888 Cactus Boulevard, Phoenix, AZ 85001", rating: 4, rooms: 150, image: "https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=600&h=400&fit=crop", status: "Active", phone: "+1 (602) 555-0888", email: "info@desertoasis.com", amenities: ["Pool", "Spa", "Golf Course", "Restaurant", "Bar", "WiFi", "Tennis"], description: "An oasis in the Sonoran Desert featuring championship golf and world-class spa treatments." }
        ];

        function renderStars(rating) {
            let stars = '';
            for (let i = 0; i < 5; i++) {
                if (i < rating) {
                    stars += '<svg class="star star-filled" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
                } else {
                    stars += '<svg class="star star-empty" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
                }
            }
            return stars;
        }

        function getHotelId() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id')) || 1;
        }

        function renderHotelDetail() {
            const id = getHotelId();
            const hotel = hotels.find(h => h.id === id) || hotels[0];

            document.getElementById('hotelDetail').innerHTML = `
                <div class="detail-header">
                    <img src="${hotel.image}" alt="${hotel.name}" class="detail-image">
                    <div class="detail-info">
                        <h1 class="detail-title">${hotel.name}</h1>
                        <p class="detail-subtitle">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            ${hotel.location}
                        </p>
                        <div class="rating" style="margin-bottom: 1rem;">
                            ${renderStars(hotel.rating)}
                        </div>
                        <span class="status-badge ${hotel.status === 'Active' ? 'status-confirmed' : 'status-pending'}">${hotel.status}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">About</h3>
                    <p style="color: #4b5563; line-height: 1.7;">${hotel.description}</p>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Hotel Information</h3>
                    <div class="detail-row">
                        <span class="detail-label">Address</span>
                        <span class="detail-value">${hotel.address}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${hotel.phone}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${hotel.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Total Rooms</span>
                        <span class="detail-value">${hotel.rooms}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Amenities</h3>
                    <div class="amenities-list">
                        ${hotel.amenities.map(amenity => `
                            <span class="amenity-tag">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                </svg>
                                ${amenity}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        renderHotelDetail();
    </script>
</body>

</html>
