<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Details - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="payments.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Payments
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="detail-container fade-in" id="paymentDetail">
        </div>
    </main>

    <script>
        const payments = [
            { id: "PAY001", reservationId: "RES001", guest: "Michael Anderson", email: "michael@email.com", phone: "+1 (555) 123-4567", hotel: "Grand Plaza Hotel", room: "Deluxe Suite", checkIn: "2024-03-15", checkOut: "2024-03-20", date: "2024-03-10", time: "14:32:45", method: "Credit Card", cardLast4: "4242", cardBrand: "Visa", status: "Completed", amount: 1250, tax: 112.50, serviceFee: 0, total: 1362.50, transactionId: "TXN_A1B2C3D4E5", billingAddress: "123 Main St, New York, NY 10001" },
            { id: "PAY002", reservationId: "RES002", guest: "Sarah Johnson", email: "sarah.j@email.com", phone: "+1 (555) 234-5678", hotel: "Seaside Resort", room: "Ocean View Room", checkIn: "2024-03-18", checkOut: "2024-03-22", date: "2024-03-12", time: "09:15:22", method: "Credit Card", cardLast4: "1234", cardBrand: "Mastercard", status: "Pending", amount: 890, tax: 80.10, serviceFee: 0, total: 970.10, transactionId: "TXN_F6G7H8I9J0", billingAddress: "456 Beach Ave, Miami, FL 33139" },
            { id: "PAY003", reservationId: "RES003", guest: "David Wilson", email: "dwilson@email.com", phone: "+1 (555) 345-6789", hotel: "Mountain Lodge", room: "Mountain Suite", checkIn: "2024-03-20", checkOut: "2024-03-25", date: "2024-03-08", time: "16:45:10", method: "Debit Card", cardLast4: "5678", cardBrand: "Visa", status: "Completed", amount: 1100, tax: 99.00, serviceFee: 0, total: 1199.00, transactionId: "TXN_K1L2M3N4O5", billingAddress: "789 Mountain Rd, Denver, CO 80202" },
            { id: "PAY004", reservationId: "RES004", guest: "Emily Brown", email: "emily.b@email.com", phone: "+1 (555) 456-7890", hotel: "City Center Inn", room: "Standard Room", checkIn: "2024-03-22", checkOut: "2024-03-24", date: "2024-03-15", time: "11:20:33", method: "Credit Card", cardLast4: "9012", cardBrand: "Amex", status: "Refunded", amount: 320, tax: 28.80, serviceFee: 0, total: 348.80, transactionId: "TXN_P6Q7R8S9T0", billingAddress: "321 State St, Chicago, IL 60601", refundDate: "2024-03-16", refundReason: "Reservation cancelled due to emergency" },
            { id: "PAY005", reservationId: "RES005", guest: "James Taylor", email: "jtaylor@email.com", phone: "+1 (555) 567-8901", hotel: "Lakefront Hotel", room: "Lake View Suite", checkIn: "2024-03-25", checkOut: "2024-03-30", date: "2024-03-18", time: "10:05:18", method: "Credit Card", cardLast4: "3456", cardBrand: "Visa", status: "Completed", amount: 1575, tax: 141.75, serviceFee: 0, total: 1716.75, transactionId: "TXN_U1V2W3X4Y5", billingAddress: "555 Lake Dr, Seattle, WA 98101" },
            { id: "PAY006", reservationId: "RES006", guest: "Lisa Martinez", email: "lisa.m@email.com", phone: "+1 (555) 678-9012", hotel: "Desert Oasis Resort", room: "Golf Villa", checkIn: "2024-03-28", checkOut: "2024-04-02", date: "2024-03-20", time: "15:55:42", method: "Bank Transfer", cardLast4: null, cardBrand: null, status: "Pending", amount: 2100, tax: 189.00, serviceFee: 25.00, total: 2314.00, transactionId: "TXN_Z6A7B8C9D0", billingAddress: "888 Cactus Blvd, Phoenix, AZ 85001", bankName: "Chase Bank", accountLast4: "7890" },
            { id: "PAY007", reservationId: "RES007", guest: "Robert Garcia", email: "rgarcia@email.com", phone: "+1 (555) 789-0123", hotel: "Grand Plaza Hotel", room: "Executive Suite", checkIn: "2024-04-01", checkOut: "2024-04-05", date: "2024-03-22", time: "08:30:55", method: "Credit Card", cardLast4: "7890", cardBrand: "Mastercard", status: "Completed", amount: 1800, tax: 162.00, serviceFee: 0, total: 1962.00, transactionId: "TXN_E1F2G3H4I5", billingAddress: "999 Business Center, New York, NY 10002" },
            { id: "PAY008", reservationId: "RES008", guest: "Jennifer Lee", email: "jlee@email.com", phone: "+1 (555) 890-1234", hotel: "Seaside Resort", room: "Beachfront Bungalow", checkIn: "2024-04-05", checkOut: "2024-04-10", date: "2024-03-25", time: "12:10:08", method: "Credit Card", cardLast4: "2468", cardBrand: "Visa", status: "Completed", amount: 1650, tax: 148.50, serviceFee: 0, total: 1798.50, transactionId: "TXN_J6K7L8M9N0", billingAddress: "222 Family Lane, Los Angeles, CA 90001" }
        ];

        function getStatusClass(status) {
            switch (status.toLowerCase()) {
                case 'completed': return 'status-confirmed';
                case 'pending': return 'status-pending';
                case 'refunded': return 'status-cancelled';
                default: return 'status-pending';
            }
        }

        function getPaymentId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || 'PAY001';
        }

        function renderPaymentDetail() {
            const id = getPaymentId();
            const payment = payments.find(p => p.id === id) || payments[0];

            let refundSection = '';
            if (payment.status === 'Refunded') {
                refundSection = `
                    <div class="detail-section" style="background: #fef2f2; border: 1px solid #fee2e2;">
                        <h3 class="detail-section-title" style="color: #dc2626;">Refund Information</h3>
                        <div class="detail-row">
                            <span class="detail-label">Refund Date</span>
                            <span class="detail-value">${payment.refundDate}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Refund Reason</span>
                            <span class="detail-value">${payment.refundReason}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Refund Amount</span>
                            <span class="detail-value" style="color: #dc2626;">$${payment.total.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }

            let paymentMethodInfo = '';
            if (payment.method === 'Bank Transfer') {
                paymentMethodInfo = `
                    <div class="detail-row">
                        <span class="detail-label">Bank</span>
                        <span class="detail-value">${payment.bankName}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Account</span>
                        <span class="detail-value">****${payment.accountLast4}</span>
                    </div>
                `;
            } else if (payment.cardLast4) {
                paymentMethodInfo = `
                    <div class="detail-row">
                        <span class="detail-label">Card Brand</span>
                        <span class="detail-value">${payment.cardBrand}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Card Number</span>
                        <span class="detail-value">**** **** **** ${payment.cardLast4}</span>
                    </div>
                `;
            }

            document.getElementById('paymentDetail').innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
                    <div>
                        <h1 class="detail-title">Payment ${payment.id}</h1>
                        <p class="detail-subtitle">Transaction ID: ${payment.transactionId}</p>
                    </div>
                    <span class="status-badge ${getStatusClass(payment.status)}" style="font-size: 0.875rem; padding: 0.5rem 1rem;">${payment.status}</span>
                </div>

                ${refundSection}

                <div class="detail-section">
                    <h3 class="detail-section-title">Guest Information</h3>
                    <div class="detail-row">
                        <span class="detail-label">Guest Name</span>
                        <span class="detail-value">${payment.guest}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value">${payment.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value">${payment.phone}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Billing Address</span>
                        <span class="detail-value">${payment.billingAddress}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Reservation Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Reservation ID</span>
                        <span class="detail-value">
                            <a href="reservationdetails.html?id=${payment.reservationId}" style="color: #3b82f6; text-decoration: none;">${payment.reservationId}</a>
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Hotel</span>
                        <span class="detail-value">${payment.hotel}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Room</span>
                        <span class="detail-value">${payment.room}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Check-in</span>
                        <span class="detail-value">${payment.checkIn}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Check-out</span>
                        <span class="detail-value">${payment.checkOut}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Payment Method</h3>
                    <div class="detail-row">
                        <span class="detail-label">Method</span>
                        <span class="detail-value">${payment.method}</span>
                    </div>
                    ${paymentMethodInfo}
                    <div class="detail-row">
                        <span class="detail-label">Payment Date</span>
                        <span class="detail-value">${payment.date}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Time</span>
                        <span class="detail-value">${payment.time}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <h3 class="detail-section-title">Payment Summary</h3>
                    <div class="detail-row">
                        <span class="detail-label">Subtotal</span>
                        <span class="detail-value">$${payment.amount.toLocaleString()}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Tax (9%)</span>
                        <span class="detail-value">$${payment.tax.toLocaleString()}</span>
                    </div>
                    ${payment.serviceFee > 0 ? `
                    <div class="detail-row">
                        <span class="detail-label">Service Fee</span>
                        <span class="detail-value">$${payment.serviceFee.toLocaleString()}</span>
                    </div>
                    ` : ''}
                    <div class="detail-row" style="border-top: 2px solid #e5e7eb; padding-top: 1rem; margin-top: 0.5rem;">
                        <span class="detail-label" style="font-weight: 600; color: #111827; font-size: 1rem;">Total Amount</span>
                        <span class="detail-value" style="font-size: 1.5rem; color: #3b82f6; font-weight: 700;">$${payment.total.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }

        renderPaymentDetail();
    </script>
</body>

</html>
