<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Amenity Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
            rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Cormorant Garamond", "Times New Roman", serif;
        }

        h1,
        h2,
        h3 {
            font-family: "Playfair Display", "Times New Roman", serif;
        }
    </style>
</head>

<body class="min-h-screen overflow-hidden bg-gradient-to-b from-[#2a1a10] via-[#1b120a] to-[#120b07] text-[#f8f2e6]">
<div class="w-full">
    <div class="mx-6 mt-6">
        <div
                class="flex items-center gap-4 rounded-2xl bg-gradient-to-r from-[#4a3220]/45 via-[#3a2618]/40 to-[#4a3220]/45 p-3 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm">
            <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f1d9b3]/25">
                <svg width="18" height="18" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 21h18M4 21V5a2 2 0 012-2h6v18M14 9h6a1 1 0 011 1v11M8 7h2M8 11h2M8 15h2M16 13h2M16 17h2">
                    </path>
                </svg>
            </div>
            <div
                    class="mx-auto flex w-full max-w-[560px] items-center gap-2 rounded-full bg-[#f1d9b3]/20 px-4 py-2">
                <svg width="16" height="16" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input id="searchInput" type="text" placeholder="Search hotels, locations, amenities ..."
                       class="w-full bg-transparent text-base text-[#f8f2e6] placeholder:text-[#d2b387] focus:outline-none">
            </div>
            <a href="/" class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/25 px-3 py-2 text-sm font-semibold text-[#f1d9b3]">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 19l-7-7 7-7"></path>
                </svg>
                Back
            </a>
        </div>

        <div class="mt-7 flex flex-wrap items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-[#f8f2e6]">Hotel Management</h1>
                <p class="text-base text-[#f1d9b3]/85">Manage and monitor your global hotel portfolio</p>
            </div>
            <button
                    class="inline-flex items-center gap-2 rounded-full bg-[#f1d9b3]/90 px-4 py-2 text-base font-semibold text-[#4a2c12] shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 5v14m7-7H5"></path>
                </svg>
                Add Hotel
            </button>
        </div>

        <div class="mt-4 flex flex-wrap items-center gap-3 ">
            <div
                    class="inline-flex items-center gap-2 rounded-full bg-gradient-to-r from-[#4a3220]/45 via-[#3a2618]/40 to-[#4a3220]/45 px-3 py-2 text-base text-[#f1d9b3]">
                <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Location:
                <select id="locationFilter" class="bg-transparent font-semibold text-[#f1d9b3] focus:outline-none">
                    <option value="">All Cities</option>
                </select>
            </div>
            <span class="text-base font-semibold text-[#f1d9b3]/85">Amenities:</span>
            <span
                    class="inline-flex items-center rounded-full border border-[#f1d9b3]/50 bg-[#f1d9b3]/90 px-3 py-1 text-sm font-semibold text-[#4a2c12]">Pool</span>
            <span
                    class="inline-flex items-center rounded-full bg-[#f1d9b3]/22 px-3 py-1 text-sm font-semibold text-[#f1d9b3]">Spa</span>
            <span
                    class="inline-flex items-center rounded-full bg-[#f1d9b3]/22 px-3 py-1 text-sm font-semibold text-[#f1d9b3]">Gym</span>
            <span
                    class="inline-flex items-center rounded-full bg-[#f1d9b3]/22 px-3 py-1 text-sm font-semibold text-[#f1d9b3]">Wifi</span>
            <span
                    class="inline-flex items-center rounded-full bg-[#f1d9b3]/22 px-3 py-1 text-sm font-semibold text-[#f1d9b3]">Library</span>
        </div>

        <div id="hotelsGrid" class="mt-6 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4"></div>

        <div class="mt-6 flex flex-wrap items-center justify-between gap-4 border-t border-[#f1d9b3]/20 pt-4 text-sm text-[#f1d9b3]/85">
            <div id="resultsMeta">
                Showing 1-4 of 49 hotels
                <span class="mx-2 text-[#f1d9b3]/30">|</span>
                Page size:
                <span class="inline-flex items-center gap-1">
                        <select id="pageSize" class="bg-transparent focus:outline-none">
                            <option value="4" selected>4</option>
                            <option value="8">8</option>
                            <option value="12">12</option>
                        </select>
                        <svg width="12" height="12" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </span>
            </div>
            <div id="pagination" class="flex items-center gap-2"></div>
        </div>
    </div>
</div>
<script th:inline="none">
    const API_BASE = "http://localhost:8081";
    const grid = document.getElementById("hotelsGrid");
    const resultsMeta = document.getElementById("resultsMeta");
    const pagination = document.getElementById("pagination");
    const searchInput = document.getElementById("searchInput");
    const locationFilter = document.getElementById("locationFilter");
    const pageSizeSelect = document.getElementById("pageSize");

    let currentPage = 0;
    let totalPages = 0;
    let totalElements = 0;
    let isLoading = false;
    let locationsLoaded = false;

    function buildHotelCard(hotel) {
        const name = hotel?.name ?? "Unnamed Hotel";
        const location = hotel?.location ?? "Unknown Location";
        const description = hotel?.description ?? "No description available.";
        const fallbackImages = [
            "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800&h=600&fit=crop",
            "https://images.unsplash.com/photo-1501117716987-c8e1ecb210fe?w=800&h=600&fit=crop",
            "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=800&h=600&fit=crop",
            "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=800&h=600&fit=crop"
        ];
        const imageUrl = hotel?.image || fallbackImages[(name.length + location.length) % fallbackImages.length];
        return `
            <div class="h-[425px] overflow-hidden rounded-2xl border border-[#f1d9b3]/20 bg-gradient-to-b from-[#24160d]/95 to-[#1a110a]/95 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/15 backdrop-blur-sm">
                <div class="h-[235px] bg-cover bg-center" style="background-image: linear-gradient(180deg, rgba(12,8,4,0.15), rgba(12,8,4,0.55)), url('${imageUrl}');"></div>
                <div class="p-4">
                    <h3 class="text-base font-bold text-[#f8f2e6]">${name}</h3>
                    <div class="mt-2 flex items-center gap-2 text-sm text-[#f1d9b3]/85">
                        <svg width="12" height="12" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        ${location}
                    </div>
                    <p class="mt-3 min-h-[40px] text-sm leading-5 text-[#f1d9b3]/85">${description}</p>
                    <div class="mt-4 flex items-center gap-2">
                        <button class="flex-1 rounded-lg bg-[#f1d9b3]/90 px-3 py-2 text-sm font-semibold text-[#4a2c12]">
                            View Details
                        </button>
                        <button class="inline-flex h-7 w-7 items-center justify-center rounded-lg border border-[#f1d9b3]/25 bg-[#1f140b]/60">
                            <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="inline-flex h-7 w-7 items-center justify-center rounded-lg border border-[#f1d9b3]/25 bg-[#1f140b]/60">
                            <svg width="14" height="14" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6h16z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderPagination() {
        if (totalPages <= 1) {
            pagination.innerHTML = "";
            return;
        }
        const prevDisabled = currentPage === 0;
        const nextDisabled = currentPage >= totalPages - 1;
        const pageButtons = [];

        const addButton = (label, page, isActive = false, isDisabled = false) => {
            pageButtons.push(`
                <button ${isDisabled ? "disabled" : ""} data-page="${page}"
                    class="inline-flex h-7 min-w-[28px] items-center justify-center rounded-lg px-2 text-sm ${isActive ? "bg-[#f1d9b3]/90 text-[#4a2c12]" : "bg-[#1f140b]/60 text-[#f1d9b3] ring-1 ring-[#f1d9b3]/25"}">
                    ${label}
                </button>
            `);
        };

        addButton("‹", currentPage - 1, false, prevDisabled);

        const maxButtons = 5;
        let start = Math.max(0, currentPage - 2);
        let end = Math.min(totalPages - 1, start + maxButtons - 1);
        start = Math.max(0, end - maxButtons + 1);

        for (let i = start; i <= end; i++) {
            addButton(i + 1, i, i === currentPage, false);
        }

        if (end < totalPages - 1) {
            pageButtons.push(`<span class="px-1 text-[#f1d9b3]/70">...</span>`);
            addButton(totalPages, totalPages - 1, false, false);
        }

        addButton("›", currentPage + 1, false, nextDisabled);

        pagination.innerHTML = pageButtons.join("");
        pagination.querySelectorAll("button[data-page]").forEach(btn => {
            btn.addEventListener("click", () => {
                const page = parseInt(btn.getAttribute("data-page"), 10);
                if (!Number.isNaN(page) && page >= 0 && page < totalPages) {
                    currentPage = page;
                    loadHotels();
                }
            });
        });
    }

    function updateMeta() {
        const size = parseInt(pageSizeSelect.value, 10);
        const start = totalElements === 0 ? 0 : currentPage * size + 1;
        const end = Math.min(totalElements, (currentPage + 1) * size);
        resultsMeta.innerHTML = `Showing ${start}-${end} of ${totalElements} hotels
            <span class="mx-2 text-[#f1d9b3]/30">|</span>
            Page size:
            <span class="inline-flex items-center gap-1">
                ${pageSizeSelect.value}
                <svg width="12" height="12" fill="none" stroke="#f1d9b3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </span>`;
    }

    async function loadLocationsIfNeeded(data) {
        if (locationsLoaded) return;
        const locations = new Set();
        (data || []).forEach(h => {
            if (h?.location) locations.add(h.location);
        });
        if (locations.size === 0) return;
        const options = ["", ...Array.from(locations).sort()];
        locationFilter.innerHTML = options.map(loc => `<option value="${loc}">${loc || "All Cities"}</option>`).join("");
        locationsLoaded = true;
    }

    async function fetchHotels({ page, size, search, location }) {
        const params = new URLSearchParams({ page, size });
        let url = `${API_BASE}/hotels?${params.toString()}`;

        if (location) {
            url = `${API_BASE}/hotels/search/findByLocation?location=${encodeURIComponent(location)}&${params.toString()}`;
        } else if (search) {
            url = `${API_BASE}/hotels/search/findByName?name=${encodeURIComponent(search)}&${params.toString()}`;
        }

        const response = await fetch(url);
        if (!response.ok) throw new Error("Failed to load hotels");
        return response.json();
    }

    function renderLoadingSkeletons(count) {
        const skeleton = `
            <div class="h-[425px] overflow-hidden rounded-2xl border border-[#f1d9b3]/20 bg-[#1f140b]/40 shadow-[0_24px_60px_rgba(0,0,0,0.35)] ring-1 ring-[#f1d9b3]/10 backdrop-blur-sm animate-pulse">
                <div class="h-[235px] bg-[#3a2417]/40"></div>
                <div class="p-4 space-y-3">
                    <div class="h-4 w-2/3 rounded bg-[#f1d9b3]/20"></div>
                    <div class="h-3 w-1/2 rounded bg-[#f1d9b3]/15"></div>
                    <div class="h-3 w-full rounded bg-[#f1d9b3]/10"></div>
                    <div class="h-3 w-4/5 rounded bg-[#f1d9b3]/10"></div>
                    <div class="mt-4 h-8 rounded bg-[#f1d9b3]/20"></div>
                </div>
            </div>
        `;
        grid.innerHTML = Array.from({ length: count }, () => skeleton).join("");
    }

    async function loadHotels() {
        if (isLoading) return;
        const size = parseInt(pageSizeSelect.value, 10);
        const search = searchInput.value.trim();
        const location = locationFilter.value;

        isLoading = true;
        renderLoadingSkeletons(size);
        try {
            const data = await fetchHotels({ page: currentPage, size, search, location });
            console.log("DATA", data);
            const hotels = data?._embedded?.hotels || [];
            totalPages = data?.page?.totalPages ?? 0;
            totalElements = data?.page?.totalElements ?? 0;

            await loadLocationsIfNeeded(hotels);
            if (hotels.length === 0) {
                grid.innerHTML = `<div class="text-[#f1d9b3]/80">No hotels found.</div>`;
            } else {
                grid.innerHTML = hotels.map(buildHotelCard).join("");
            }
            updateMeta();
            renderPagination();
        } catch (err) {
            grid.innerHTML = `<div class="text-[#f1d9b3]/80">Failed to load hotels.</div>`;
            totalPages = 0;
            totalElements = 0;
            updateMeta();
            renderPagination();
        } finally {
            isLoading = false;
        }
    }

    let searchTimeout;
    searchInput.addEventListener("input", () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 0;
            loadHotels();
        }, 350);
    });

    locationFilter.addEventListener("change", () => {
        currentPage = 0;
        loadHotels();
    });

    pageSizeSelect.addEventListener("change", () => {
        currentPage = 0;
        loadHotels();
    });
    loadHotels();
</script>
</body>

</html>
