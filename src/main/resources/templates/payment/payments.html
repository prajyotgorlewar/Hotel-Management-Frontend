<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Payments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .revenue-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border-radius: 12px;
            padding: 24px;
        }
        .revenue-card .amount {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4aa;
        }
        .table thead th { background-color: #1a1a2e; color: white; }
        .btn-view  { background-color: #0d6efd; color: white; }
        .btn-edit  { background-color: #ffc107; color: black; }
    </style>
</head>
<body>
<div class="container mt-4">

    <!-- Header Row -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Payments — Hotel ID: <span th:text="${hotelId}"></span></h2>
        <a th:href="@{/hotel-payments/create(hotelId=${hotelId})}" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i> Create Payment
        </a>
    </div>

    <!-- Total Revenue Card -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="revenue-card shadow">
                <div class="text-uppercase small mb-1 opacity-75">Total Revenue</div>
                <div class="amount">
                    ₹<span th:text="${#aggregates.sum(allPayments.![amount])}"></span>
                </div>
                <div class="small opacity-75 mt-1">
                    <span th:text="${allPayments.size()}"></span> payment(s) found
                </div>
            </div>
        </div>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- No Payments -->
    <div th:if="${payments.isEmpty()}">
        <p class="text-warning">No payments found.</p>
    </div>

    <!-- Payments Table -->
    <table class="table table-bordered table-striped table-hover shadow-sm" th:if="${!payments.isEmpty()}">
        <thead>
        <tr>
            <th>Sr. No.</th>
            <th>Amount</th>
            <th>Payment Date</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment, iterStat : ${payments}">
            <td th:text="${currentPage * size + iterStat.count}"></td>
            <td th:text="'₹' + ${payment.amount}"></td>
            <td th:text="${payment.paymentDate}"></td>
            <td>
                <span class="badge"
                      th:classappend="${payment.paymentStatus == 'Paid'} ? 'bg-success' : 'bg-danger'"
                      th:text="${payment.paymentStatus}">
                </span>
            </td>
            <td class="text-center">
                <a th:href="@{/hotel-payments/view(paymentId=${payment.paymentId})}"
                   class="btn btn-sm btn-view me-1">
                    <i class="bi bi-eye me-1"></i>View
                </a>
                <a th:href="@{/hotel-payments/edit(paymentId=${payment.paymentId})}"
                   class="btn btn-sm btn-edit">
                    <i class="bi bi-pencil me-1"></i>Edit
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
        <ul class="pagination">

            <!-- Previous -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/hotel-payments(hotelId=${hotelId}, page=${currentPage - 1}, size=${size})}">
                    &laquo; Prev
                </a>
            </li>

            <!-- Page Numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/hotel-payments(hotelId=${hotelId}, page=${i}, size=${size})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/hotel-payments(hotelId=${hotelId}, page=${currentPage + 1}, size=${size})}">
                    Next &raquo;
                </a>
            </li>

        </ul>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
