<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Hotel Management</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <svg class="navbar-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
                Hotel Manager
            </a>
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title">Payments</h1>
        <p class="page-subtitle">Manage all financial transactions</p>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search payments..."
                onkeyup="filterPayments()">
        </div>

        <div class="table-container fade-in">
            <table class="data-table" id="paymentsTable">
                <thead>
                    <tr>
                        <th>Payment ID</th>
                        <th>Reservation</th>
                        <th>Guest</th>
                        <th>Date</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="paymentsBody">
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const payments = [
            { id: "PAY001", reservationId: "RES001", guest: "Michael Anderson", email: "michael@email.com", hotel: "Grand Plaza Hotel", date: "2024-03-10", method: "Credit Card", cardLast4: "4242", cardBrand: "Visa", status: "Completed", amount: 1250, tax: 112.50, total: 1362.50 },
            { id: "PAY002", reservationId: "RES002", guest: "Sarah Johnson", email: "sarah.j@email.com", hotel: "Seaside Resort", date: "2024-03-12", method: "Credit Card", cardLast4: "1234", cardBrand: "Mastercard", status: "Pending", amount: 890, tax: 80.10, total: 970.10 },
            { id: "PAY003", reservationId: "RES003", guest: "David Wilson", email: "dwilson@email.com", hotel: "Mountain Lodge", date: "2024-03-08", method: "Debit Card", cardLast4: "5678", cardBrand: "Visa", status: "Completed", amount: 1100, tax: 99.00, total: 1199.00 },
            { id: "PAY004", reservationId: "RES004", guest: "Emily Brown", email: "emily.b@email.com", hotel: "City Center Inn", date: "2024-03-15", method: "Credit Card", cardLast4: "9012", cardBrand: "Amex", status: "Refunded", amount: 320, tax: 28.80, total: 348.80 },
            { id: "PAY005", reservationId: "RES005", guest: "James Taylor", email: "jtaylor@email.com", hotel: "Lakefront Hotel", date: "2024-03-18", method: "Credit Card", cardLast4: "3456", cardBrand: "Visa", status: "Completed", amount: 1575, tax: 141.75, total: 1716.75 },
            { id: "PAY006", reservationId: "RES006", guest: "Lisa Martinez", email: "lisa.m@email.com", hotel: "Desert Oasis Resort", date: "2024-03-20", method: "Bank Transfer", cardLast4: null, cardBrand: null, status: "Pending", amount: 2100, tax: 189.00, total: 2289.00 },
            { id: "PAY007", reservationId: "RES007", guest: "Robert Garcia", email: "rgarcia@email.com", hotel: "Grand Plaza Hotel", date: "2024-03-22", method: "Credit Card", cardLast4: "7890", cardBrand: "Mastercard", status: "Completed", amount: 1800, tax: 162.00, total: 1962.00 },
            { id: "PAY008", reservationId: "RES008", guest: "Jennifer Lee", email: "jlee@email.com", hotel: "Seaside Resort", date: "2024-03-25", method: "Credit Card", cardLast4: "2468", cardBrand: "Visa", status: "Completed", amount: 1650, tax: 148.50, total: 1798.50 }
        ];

        function getStatusClass(status) {
            switch (status.toLowerCase()) {
                case 'completed': return 'status-confirmed';
                case 'pending': return 'status-pending';
                case 'refunded': return 'status-cancelled';
                default: return 'status-pending';
            }
        }

        function renderPayments(data) {
            const tbody = document.getElementById('paymentsBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><h3>No payments found</h3></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(payment => `
                <tr onclick="location.href='paymentdetails.html?id=${payment.id}'">
                    <td><strong>${payment.id}</strong></td>
                    <td>${payment.reservationId}</td>
                    <td>${payment.guest}</td>
                    <td>${payment.date}</td>
                    <td>${payment.method}${payment.cardLast4 ? ` (*${payment.cardLast4})` : ''}</td>
                    <td><span class="status-badge ${getStatusClass(payment.status)}">${payment.status}</span></td>
                    <td><strong>$${payment.total.toLocaleString()}</strong></td>
                </tr>
            `).join('');
        }

        function filterPayments() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = payments.filter(p =>
                p.guest.toLowerCase().includes(search) ||
                p.id.toLowerCase().includes(search) ||
                p.reservationId.toLowerCase().includes(search) ||
                p.hotel.toLowerCase().includes(search)
            );
            renderPayments(filtered);
        }

        renderPayments(payments);
    </script>
</body>

</html>
