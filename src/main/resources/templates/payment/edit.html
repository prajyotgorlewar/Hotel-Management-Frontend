<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .form-label { font-weight: 600; }
        .card-header-custom {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 20px 32px;
        }
        .btn-update {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
        }
        .btn-update:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<div class="container mt-4">

    <div class="mb-4">
        <a onclick="history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>
    </div>

    <div class="col-md-6 mx-auto">

        <div class="card-header-custom">
            <div class="small opacity-75">Editing Payment ID #<span th:text="${payment.paymentId}"></span></div>
            <div class="fs-5 fw-bold" th:text="${payment.hotelName}"></div>
            <div class="small opacity-75">Guest: <span th:text="${payment.guestName}"></span></div>
        </div>

        <div class="form-card" style="border-radius: 0 0 12px 12px;">
            <form th:action="@{/hotel-payments/edit(paymentId=${payment.paymentId})}"
                  th:object="${updatePaymentDTO}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Amount (₹)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:field="*{amount}" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Payment Date</label>
                    <input type="date" class="form-control"
                           th:field="*{paymentDate}" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Payment Status</label>
                    <select class="form-select" th:field="*{paymentStatus}" required>
                        <option value="">-- Select Status --</option>
                        <option value="Paid">Paid</option>
                        <option value="CD">CD</option>
                        <option value="Pending">Pending</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Reservation ID</label>
                    <input type="number" class="form-control"
                           name="reservationId"
                           placeholder="Enter reservation ID"
                           required/>
                </div>

                <button type="submit" class="btn btn-update w-100">
                    <i class="bi bi-save me-1"></i> Update Payment
                </button>

            </form>
        </div>
    </div>

</div>
</body>
</html>
